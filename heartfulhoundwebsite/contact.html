    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
      }

      body {
        font-family: 'Times New Roman', Times, serif;
        background-color: #E6B8AD;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ---------- CONTACT PAGE CONTENTS ---------- */
      
      .contact-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1rem 5vw 3rem;
        padding-top: 6rem;
      }

      /* ---------- CONTACT PAGE HEADING ---------- */
      
      .page-heading {
        font-size: 2.8rem;
        font-weight: 700;
        font-style: italic;
        letter-spacing: 0.05em;
        color: black;
        text-align: center;
        margin-bottom: 1.8rem;
      }

      /* ---------- CONTACT BOX ---------- */
      
      .contact-box {
        background: white;
        border: 2px solid #6F6F6F;
        border-radius: 6px;
        width: 100%;
        max-width: 520px;
        padding: 1.5rem 2rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
      }
      
      .phone-number {
        font-size: 1.2rem;
        font-weight: 700;
        color: black;
      }

      .contact-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        width: 80%;
        max-width: 320px;
        padding: 0.75rem 1.4rem;
        background: white;
        border-radius: 4px;
        font-style: italic;
        font-size: 1.2rem;
        font-weight: 700;
        color: black;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.18s ease;
      }

      /* ---------- WHATSAPP BUTTON ---------- */
      
      .btn-whatsapp {
        border: 2px solid #25D366;
        font-weight: 700;
        font-size: 1.2rem;
      }

      /* ---------- EMAIL BUTTON ---------- */
      
      .btn-email {
        border: 2px solid #6F6F6F;
        font-weight: 700;
        font-size: 1.2rem;
      }

      /* ---------- HOVER EFFECTS ONLY ON DESKTOP ---------- */
        
      @media (hover: hover) and (pointer: fine) {
        .btn-whatsapp:hover {
          background: #25D366;
          color: white;
          transform: translateY(-4px);
        }

        .btn-email:hover {
          background: #6F6F6F;
          color: white;
          transform: translateY(-4px);
        }
      }

      /* ---------- GET SOCIAL SECTION ---------- */
      
      .social-heading {
        font-style: italic;
        font-size: 1.4rem;
        color: black;
        font-weight: 700;
        text-align: center;
        margin-top: 0.4rem;
        margin-bottom: 0.2rem;
      }

      .social-icons {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-top: 0.4rem;
      }

      .social-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3.2rem;
        height: 3.2rem;
        border: 1px solid rgba(24, 119, 242, 0.9);
        border-radius: 0.5rem;
        background: white;
        padding: 0.2rem;
        text-decoration: none;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .social-link svg {
        width: 2.8rem;
        height: 2.8rem;
      }

      @media (hover: hover) and (pointer: fine) {
        .social-link:hover {
          transform: translateY(-4px);
          box-shadow: 0 0 60px rgba(24, 119, 242, 0.9);
        }
      }

      /* ---------- COPYRIGHT ---------- */
      
      .copyright {
        font-size: 0.8rem;
        color: black;
        text-align: center;
        margin-top: 0.6rem;
      }

      /* ---------- ICON SVG ---------- */
      
      .icon {
        width: 1.1rem;
        height: 1.1rem;
        flex-shrink: 0;
      }

/* ───────────────────────────────────────────────── MEDIA QUERIES ────────────────────────────────────────────────── */

      /* ---------- 1024px ---------- */
      
      @media screen and (max-width: 1024px) {
        .page-heading {
          font-size: 2rem;
        }

        .contact-box {
          max-width: 480px;
          padding: 2.2rem 1.8rem 1.8rem;
        }

        .contact-btn {
          width: 85%;
          font-size: 0.98rem;
        }
      }

      /* ---------- 700px ---------- */
      
      @media screen and (max-width: 700px) {
        .page-heading {
          font-size: 2.2rem;
          letter-spacing: 0.08em;
        }

        .contact-box {
          max-width: 94vw;
          padding: 2rem 1.4rem 1.6rem;
          gap: 1rem;
        }

        .contact-btn {
          width: 90%;
          font-size: 1.1rem;
          padding: 0.7rem 1.1rem;
          transition: none;
        }

        .btn-whatsapp:hover,
        .btn-email:hover {
          background: white !important;
          color: black !important;
          transform: none !important;
          box-shadow: none !important;
        }
      
        .contact-btn:hover {
          background: white !important;
          color: black !important;
          transform: none !important;
        }

        .social-link:hover {
          transform: none !important;
          box-shadow: none !important;
        }

        .social-heading {
          font-size: 1.3rem;
        }
        
        .social-link svg {
          width: 2.6rem;
          height: 2.6rem;
        }
      }

      /* ---------- 468px ---------- */
      
      @media screen and (max-width: 468px) {
        .contact-wrapper {
          padding: 0.8rem 4vw 2rem;
          padding-top: 5rem;
        }

        .page-heading {
          font-size: 1.9rem;
          letter-spacing: 0.05em;
          margin-bottom: 1.2rem;
        }

        .contact-box {
          max-width: 96vw;
          padding: 1.6rem 1rem 1.4rem;
          gap: 0.9rem;
        }

        .contact-btn {
          width: 95%;
          font-size: 1.2rem;
          padding: 0.65rem 0.9rem;
          transition: none;
        }

      
        .btn-whatsapp:hover,
        .btn-email:hover {
          background: white !important;
          color: black !important;
          transform: none !important;
          box-shadow: none !important;
        }
      
        .contact-btn:hover {
          background: white !important;
          color: black !important;
          transform: none !important;
        }

        .social-link:hover {
          transform: none !important;
          box-shadow: none !important;
        }

        .social-link svg {
          width: 2.4rem;
          height: 2.4rem;
        }
        
        .social-heading {
          font-size: 1.3rem;
        }

        .copyright {
          font-size: 0.8rem;
        }
      }

<!-- ─────────────────────────────────────────────────── SCRIPT ──────────────────────────────────────────────────── -->

    <script>
      const btn = document.getElementById("hamburgerBtn");
      const dropdown = document.getElementById("navDropdown");

      btn.addEventListener("click", () => {
        const isOpen = btn.classList.toggle("is-open");
        dropdown.classList.toggle("is-open", isOpen);
        btn.setAttribute("aria-expanded", isOpen);
      });

      dropdown.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          btn.classList.remove("is-open");
          dropdown.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
        });
      });

      document.addEventListener("click", (e) => {
        if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
          btn.classList.remove("is-open");
          dropdown.classList.remove("is-open");
          btn.setAttribute("aria-expanded", "false");
        }
      });
    </script>
