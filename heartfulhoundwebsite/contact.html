      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body { font-family: 'Times New Roman', Times, serif; background-color: #E6B8AD; }

/* ────────────────────────────────────────────────── HEADER CSS ──────────────────────────────────────────────────── */

      header {
        height: 5rem;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 100;
      }

      /* ---------- NAVBAR ---------- */

      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        height: 5rem;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 3vw;
        width: 100%;
      }

      /* ---------- THIN GLASS LINE AT BOTTOM OF HEADER ---------- */

      .navbar::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 3vw;
        width: calc(100% - 6vw);
        height: 1px;
        background: rgba(255, 255, 255, 0.18);
      }

      /* ---------- LOGO ---------- */

      .navbar-logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
        flex-shrink: 0;
      }

      .navbar-logo-img { width: 10rem; }

      .navbar-logo-img img {
        width: 100%;
        height: auto;
        display: block;
      }

      /* ---------- HAMBURGER ---------- */

      .navbar-hamburger {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 6px;
        width: 2.8rem;
        height: 2.8rem;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0.4rem;
        position: relative;
        z-index: 1100;
        flex-shrink: 0;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .navbar-hamburger .bar {
        display: block;
        width: 1.75rem;
        height: 2.5px;
        background-color: black;
        border-radius: 2px;
        transition:
          transform 0.35s cubic-bezier(0.23, 1, 0.32, 1),
          opacity 0.25s ease,
          background-color 0.25s ease;
        transform-origin: center;
      }

      .navbar-hamburger:hover .bar { background-color: white; }

      .navbar-hamburger.is-open .bar:nth-child(1) {
        transform: translateY(0.5rem) rotate(45deg);
        background-color: black;
      }

      .navbar-hamburger.is-open .bar:nth-child(2) {
        opacity: 0;
        transform: scaleX(0);
      }

      .navbar-hamburger.is-open .bar:nth-child(3) {
        transform: translateY(-8.5px) rotate(-45deg);
        background-color: black;
      }

      /* ---------- HAMBURGER DROP DOWN MENU ---------- */

      .navbar-dropdown {
        position: absolute;
        top: 5rem;
        right: 3vw;
        width: min(22rem, 90vw);
        background: black;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 0.75rem;
        overflow: hidden;
        list-style: none;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-0.75rem) scale(0.97);
        transform-origin: top right;
        transition:
          opacity 0.3s cubic-bezier(0.23, 1, 0.32, 1),
          transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .navbar-dropdown.is-open {
        opacity: 1;
        visibility: visible;
        transform: translateY(0) scale(1);
        transition:
          opacity 0.3s cubic-bezier(0.23, 1, 0.32, 1),
          transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .navbar-dropdown li { border-bottom: 1px solid rgba(255, 255, 255, 0.07); }

      .navbar-dropdown li:last-child { border-bottom: none; }

      .navbar-dropdown a {
        display: block;
        padding: 1.1rem 1.6rem;
        font-size: 1.05rem;
        font-style: italic;
        color: white;
        text-decoration: none;
        letter-spacing: 0.03em;
        transition:
          background 0.18s ease,
          padding-left 0.18s ease;
      }

      .navbar-dropdown a:hover {
        background: rgba(255, 255, 255, 0.12);
        padding-left: 2rem;
      }

      .navbar-dropdown a:focus-visible {
        outline: 2px solid white;
        outline-offset: 3px;
      }

/* ───────────────────────────────────────────────── MEDIA QUERIES ────────────────────────────────────────────────── */

      /* ---------- 700px ---------- */

<!-- ─────────────────────────────────────────────────── SCRIPT ──────────────────────────────────────────────────── -->

      <script>
        const btn = document.getElementById("hamburgerBtn");
        const dropdown = document.getElementById("navDropdown");

        btn.addEventListener("click", () => {
          const isOpen = btn.classList.toggle("is-open");
          dropdown.classList.toggle("is-open", isOpen);
          btn.setAttribute("aria-expanded", isOpen);
        });

        dropdown.querySelectorAll("a").forEach((link) => {
          link.addEventListener("click", () => {
            btn.classList.remove("is-open");
            dropdown.classList.remove("is-open");
            btn.setAttribute("aria-expanded", "false");
          });
        });

        document.addEventListener("click", (e) => {
          if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
            btn.classList.remove("is-open");
            dropdown.classList.remove("is-open");
            btn.setAttribute("aria-expanded", "false");
          }
        });
      </script>
